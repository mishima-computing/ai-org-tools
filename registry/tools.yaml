# Corps — the AI Org's media-production umbrella (pronounced "core"; named after the Beatles' Apple
# Corps multimedia company — see docs/decisions/ADR-0001). `core` is the shared, medium-agnostic engine
# (the produce ladder / Library / GATE-JUDGE / capture); each entry below is a DIVISION that plugs its
# own providers (the revolver chambers) into core. The controller calls a division's entrypoint DIRECTLY
# (a deterministic workflow call, not via MCP). Add a division by adding an entry here.
version: 1
engine:
  id: core
  path: tools/core/core.py
  summary: medium-agnostic produce ladder (reuse -> explicit-generate -> synthesize), GATE/JUDGE, capture-as-asset
divisions:
  - id: graphicist
    medium: graphics
    status: skeleton            # ladder + capture + verification wired; PIL providers live; Blender/gen-image are hooks
    entrypoint: tools/graphicist/graphicist.py::produce
    providers:
      assets: Kenney CC0 catalog (tools/graphicist/assets/catalog.json)
      explicit: PIL (rungs 2-3, GATE); Blender bpy (3D source build) — hook
      synthesized: gen-image (rung 4, JUDGE) — hook, last resort
    verification:
      explicit: GATE            # reuse + explicit generation: reproducible, traceable
      synthesized: JUDGE        # gen-AI: stefan aesthetic + brief fidelity + grounding audit
    adr: docs/decisions/ADR-0001-org-tools-and-the-graphicist.md
  # - id: composer  (medium: music; source = MIDI/score/samples; view = synth (GATE) / gen-audio (JUDGE))  — future
