# Org Tools registry — the growing collection of carrier-agnostic capabilities the AI Org operates.
# Editions vendor this repo; the controller calls a tool's entrypoint DIRECTLY (a deterministic
# workflow call, not via MCP — see docs/decisions/ADR-0001). Add a tool by adding an entry here.
version: 1
tools:
  - id: graphicist
    kind: graphics
    status: skeleton            # skeleton -> the ladder + capture + verification regimes are wired; rungs 3/4 are hooks
    entrypoint: tools/graphicist/graphicist.py::produce
    summary: >-
      Produce a graphic for a brief, asset-first; generate only as a last resort and capture the result
      as a new asset so generation self-shrinks. The asset is the source of truth, the image a view.
    policy: asset-first-ladder  # 1 apply -> 2 process -> 3 procedural(deterministic) -> 4 generate(last)
    capture: capture-as-asset
    verification:
      deterministic: GATE       # rungs 1-3: reproducible, traceable
      generative: JUDGE         # rung 4: stefan aesthetic + brief fidelity + grounding audit (why no asset)
    adr: docs/decisions/ADR-0001-org-tools-and-the-graphicist.md
